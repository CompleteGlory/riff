org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Suppress KGP's JVM target mismatch validation across plugin subprojects.
# Plugin authors (audioplayers, flutter_contacts, etc.) need to fix their own KGP usage;
# this just stops the check failing our build in the meantime.
kotlin.jvm.target.validation.mode=IGNORE
android.useAndroidX=true
android.enableJetifier=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
